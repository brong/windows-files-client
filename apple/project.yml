name: FastmailFiles
options:
  bundleIdPrefix: com.fastmail.files
  deploymentTarget:
    macOS: "12.0"
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  JmapClient:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: BJL34Q426G
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  FastmailFiles:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "*.entitlements"
    resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - target: FileProviderExtension
      - package: JmapClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastmail.files.app
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/App.entitlements
        PRODUCT_NAME: Fastmail Files
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    entitlements:
      path: Sources/App/App.entitlements

  FileProviderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/FileProvider
        excludes:
          - "*.entitlements"
          - Info.plist
    dependencies:
      - package: JmapClient
      - sdk: FileProvider.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastmail.files.app.FileProvider
        INFOPLIST_FILE: Sources/FileProvider/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/FileProvider/FileProvider.entitlements
        PRODUCT_NAME: FileProviderExtension
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        SWIFT_VERSION: "5.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES
    entitlements:
      path: Sources/FileProvider/FileProvider.entitlements
